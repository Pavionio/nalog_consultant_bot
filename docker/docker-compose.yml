services:
  postgres:
    image: postgres:16
    container_name: nalog-postgres
    environment:
      POSTGRES_USER: nalog
      POSTGRES_PASSWORD: nalogpass
      POSTGRES_DB: nalog_rag
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nalog -d nalog_rag"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: nalog-qdrant
    ports:
      - "6333:6333"  # HTTP
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: nalog-llamacpp
    env_file:
      - path: ../.env
        required: false
    ports:
      - "${LLAMACPP_HOST:-127.0.0.1}:${LLAMACPP_HOST_PORT:-8080}:8080"
    volumes:
      - llama_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --host 0.0.0.0 --port 8080
      -c 8192
      -ngl 999
      --parallel 1
      --threads 8
      --hf-repo ${LLM}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health | grep -q '\"status\"[[:space:]]*:[[:space:]]*\"ok\"'"]
      interval: 10s
      timeout: 3s
      retries: 30
      # First run downloads the GGUF model (several GB) — keep the container in
      # "starting" (not "unhealthy") long enough for a slow download to finish.
      start_period: 3600s

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: nalog-bot
    env_file:
      - path: ../.env
        required: false
    environment:
      # Reach the sibling services by their compose hostnames (override the
      # localhost values from .env, which are meant for host-based dev).
      QDRANT_URL: http://qdrant:6333
      LLM_BASE_URL: http://llamacpp:8080
      EMBED_DEVICE: cuda
      HF_HOME: /root/.cache/huggingface
      PYTHONUNBUFFERED: "1"
    volumes:
      - ../data:/app/data            # bot logs, accepted-users / mode state
      - hf_cache:/root/.cache/huggingface  # cached embedder + reranker weights
    depends_on:
      qdrant:
        condition: service_started
      llamacpp:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped


volumes:
  pg_data:
  qdrant_data:
  llama_cache:
  hf_cache:
